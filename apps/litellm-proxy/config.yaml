model_list:
  # Primary model - Llama 3.3 70B for all agent reasoning tasks
  - model_name: claude-default
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
      max_tokens: 4096
      temperature: 0.3

  # Fallback - same model for reliability
  - model_name: gpt-fallback
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
      max_tokens: 4096
      temperature: 0.3

  # Cost-optimized - smaller model for summaries/less critical tasks
  - model_name: gemini-cost
    litellm_params:
      model: groq/llama-3.1-8b-instant
      api_key: os.environ/GROQ_API_KEY
      max_tokens: 2048
      temperature: 0.3

router_settings:
  routing_strategy: least-busy
  num_retries: 3
  retry_after: 5
  timeout: 30
  fallbacks:
    - {"claude-default": ["gpt-fallback"]}
    - {"gpt-fallback": ["gemini-cost"]}
  allowed_fails: 2
  cooldown_time: 60

litellm_settings:
  set_verbose: false
  json_logs: true
  success_callback: []
  failure_callback: []

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  disable_spend_logs: true
  disable_reset_budget: true
