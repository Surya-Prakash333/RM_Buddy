model_list:
  # Primary model - GPT-4o for all agent reasoning tasks
  - model_name: claude-default
    litellm_params:
      model: custom_openai/openai/gpt-oss-120b
      api_base: https://api.groq.com/openai/v1
      api_key: os.environ/GROQ_API_KEY
      max_tokens: 4096
      temperature: 0.3

  # Fallback - GPT-4o-mini for cost savings
  - model_name: gpt-fallback
    litellm_params:
      model: custom_openai/openai/gpt-oss-120b
      api_base: https://api.groq.com/openai/v1
      api_key: os.environ/GROQ_API_KEY
      max_tokens: 4096
      temperature: 0.3

  # Cost-optimized - GPT-4o-mini for summaries/less critical tasks
  - model_name: gemini-cost
    litellm_params:
      model: custom_openai/openai/gpt-oss-120b
      api_base: https://api.groq.com/openai/v1
      api_key: os.environ/GROQ_API_KEY
      max_tokens: 2048
      temperature: 0.3

  # Embeddings for vector search
  - model_name: embedding-model
    litellm_params:
      model: text-embedding-3-small
      api_key: os.environ/OPENAI_API_KEY

router_settings:
  routing_strategy: least-busy
  num_retries: 3
  retry_after: 5
  timeout: 30
  fallbacks:
    - {"claude-default": ["gpt-fallback"]}
    - {"gpt-fallback": ["gemini-cost"]}
  allowed_fails: 2
  cooldown_time: 60

litellm_settings:
  set_verbose: false
  json_logs: true
  success_callback: []
  failure_callback: []

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  disable_spend_logs: true
  disable_reset_budget: true
